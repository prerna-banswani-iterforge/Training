<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- SideBar -->
    <aside class="sidebar"> 
        <h2 class="logo">Music</h2>

        <nav>
            <ul>
                <li class="active">Home</li>
                <li>Explore</li>
                <li>Library</li>
                <li>Favorites</li>            
            </ul>
        </nav>

        <button class="playlist-btn">+New Playlist</button>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <input type="text" placeholder="Search songs, artists, albums">
            <div class="profile">K</div>
        </header>

            
        <section class="genres">
            <button>Podcasts</button>
            <button>Romance</button>
            <button>Relax</button>
            <button>Workout</button>
            <button>Party</button>
            <button>Focus</button>
            <button>Sad</button>
        </section>

        <section class="playlist-section">

        <h2>Trending Community Playlists</h2>

        <div class="card-container">

            <article class="music-card">
                <img src="https://picsum.photos/200?1">
                <h3>Love Songs</h3>
                <p>9.1M views</p>
            </article>

            <article class="music-card">
                <img src="https://picsum.photos/200?2">
                <h3>Chill Beats</h3>
                <p>5.4M views</p>
            </article>

            <article class="music-card">
                <img src="https://picsum.photos/200?3">
                <h3>Workout Mix</h3>
                <p>7M views</p>
            </article>


    </main>
</body>
</html>
