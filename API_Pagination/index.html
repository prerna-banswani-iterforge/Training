<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Table Pagination</title>
  <!-- <link rel="stylesheet" href="style.css"> -->
  <style>
    body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f4f6f9;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h2 {
  margin-bottom: 20px;
  color: #333;
}

/* Table Styling */
table {
  margin: 0 auto;
  border-collapse: collapse;
  width: 70%;
  background: #fff;
  border-radius: 10px;
}

thead {
  background: #4CAF50;
  color: white;
}

th, td {
  padding: 12px;
  text-align: left;
}

tbody tr {
  border-bottom: 1px solid #eee;
}

tbody tr:hover {
  background-color: #f1f1f1;
}


td:last-child {
  font-weight: bold;
}

td:last-child:contains("Completed") {
  color: green;
}


button {
  margin: 15px 8px;
  padding: 10px 18px;
  border: none;
  border-radius: 6px;
  background: #4CAF50;
  color: white;
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #45a049;
}

button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

/* Page info */
#pageInfo {
  margin-top: 10px;
  color: #555;
  font-size: 14px;
}
  </style>
</head>
<body>

  <h2>Data Table</h2>

  <table id="dataTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <button id="prevBtn">Previous</button>
  <button id="nextBtn">Next</button>

  <script src="script.js"></script>
</body>
</html>
